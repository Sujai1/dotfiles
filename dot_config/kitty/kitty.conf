# Enable remote control so scripts can open windows/tabs and run commands
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# Font
font_size 14.0

# macOS
macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# New tabs open in home directory instead of inheriting cwd
map cmd+t launch --type=tab --cwd=~
