# ── Prefix: Ctrl+A (easier to reach than Ctrl+B) ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits: intuitive keys ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── New window keeps current directory ──
bind c new-window -c "#{pane_current_path}"

# ── Navigate panes: vim-style h/j/k/l (prefix + key) ──
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Close pane: prefix + x (no confirmation) ──
bind x kill-pane

# ── Create panes (no prefix needed) ──
# Ctrl+N: split below     Ctrl+P: split right
bind -n C-n split-window -v -c "#{pane_current_path}"
bind -n C-p split-window -h -c "#{pane_current_path}"

# ── Mouse support ──
set -g mouse on

# ── Start numbering at 1 ──
set -g base-index 1
setw -g pane-base-index 1

# ── Colors (works with kitty) ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-kitty:Tc"

# ── Pane borders: subtle differentiation ──
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#82b1ff,bold"

# ── Status bar ──
set -g status-style "bg=#1a1a2e,fg=#eeeeee"
set -g status-left "#[fg=#82b1ff,bold] #S "
set -g status-right "%H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=#1a1a2e,bg=#82b1ff,bold] #I:#W "

# ── Don't rename windows automatically ──
set -g allow-rename off

# ── Fast escape (for vim/editors) ──
set -sg escape-time 0

# ── History ──
set -g history-limit 50000

# ── Claude Code context-aware editor: Ctrl+A g ──
# Captures conversation BEFORE Ctrl+G blanks the screen, shows it in a
# side pane, then sends Ctrl+G to Claude Code so nvim opens alongside.
# Close the context pane with prefix+x when done.
bind g run-shell -b "~/.local/bin/claude-edit '#{pane_id}'"

# ── Fork Claude Code session: Ctrl+A v ──
# Forks the Claude session in the *focused* pane (resolves session ID via PID)
bind v run-shell -b "~/.local/bin/claude-fork '#{pane_id}'"

# ── Sesh integration: Ctrl+A T to switch sessions ──
# Opens a centered popup with preview and filter hotkeys
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
